<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="cardTitle">İsmail ÖKSÜZ - Dijital Kartvizit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1A1A1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .corporate-card {
            background-color: #000000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }
        .text-corporate-gold {
            color: #FFD700;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'corporate-gold': '#FFD700',
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-100">

    <div class="w-full max-w-sm p-6 flex flex-col items-center corporate-card rounded-xl border border-gray-700/50 transition duration-300 hover:scale-[1.02]">

        <button id="langToggle" class="absolute top-3 right-4 p-2 text-xs font-semibold rounded-full bg-gray-700/50 hover:bg-corporate-gold hover:text-black transition duration-200 z-10">
            EN
        </button>

        <div class="mb-6">
            <div class="w-36 h-36 rounded-full bg-gray-700 overflow-hidden border-4 border-corporate-gold flex items-center justify-center">
                <img src="https://avatars.githubusercontent.com/u/46068969?v=4" alt="İsmail ÖKSÜZ Profil Fotoğrafı" class="object-cover w-full h-full">
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center text-center mb-6 w-full">
            
            <h1 class="text-3xl font-extrabold text-white tracking-wider mb-2" id="name">İsmail ÖKSÜZ</h1>
            
            <p class="text-xl font-extrabold text-corporate-gold mb-1" id="secondaryRole">Prompt Engineering Uzmanı</p>
            
            <p class="text-sm font-medium text-gray-400 mb-3" id="mainRole">Bilgisayar Mühendisi</p>

            <a href="https://nexyond.vercel.app" target="_blank" class="text-sm font-semibold text-red-400 hover:underline" id="founderRoleLink">
                <span id="founderRole">Kurucu, Nexyond</span>
            </a>

            <div class="space-y-1 text-sm text-gray-200 w-full px-4 border-y border-gray-600/30 py-4 flex flex-col justify-center mt-4">
                 <div class="flex items-center justify-center space-x-2 transition duration-200 hover:text-corporate-gold">
                    <i data-lucide="phone" class="w-4 h-4 text-corporate-gold flex-shrink-0"></i>
                    <a href="tel:+905382342550" class="hover:underline">
                        +90 538 234 25 50
                    </a>
                </div>
                 <div class="flex items-center justify-center space-x-2 transition duration-200 hover:text-corporate-gold">
                    <i data-lucide="mail" class="w-4 h-4 text-corporate-gold flex-shrink-0"></i>
                    <a href="mailto:ismailoeksuez22@gmail.com" class="hover:underline">
                        ismailoeksuez22@gmail.com
                    </a>
                </div>
            </div>
            
        </div>

        <div class="flex flex-wrap justify-center gap-4 w-full mt-4"> 
            
            <div class="transition duration-200 hover:scale-110">
                <a href="https://linkedin.com/in/ismailoksuz" target="_blank" title="LinkedIn Profili" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-700/50 hover:bg-corporate-gold text-corporate-gold hover:text-black">
                    <i data-lucide="linkedin" class="w-5 h-5"></i>
                </a>
            </div>

             <div class="transition duration-200 hover:scale-110">
                <a href="https://github.com/ismailoksuz" target="_blank" title="GitHub Profili" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-700/50 hover:bg-corporate-gold text-corporate-gold hover:text-black">
                    <i data-lucide="github" class="w-5 h-5"></i>
                </a>
            </div>
            
            <div class="transition duration-200 hover:scale-110">
                <a href="https://www.hackerrank.com/ismailoksuz" target="_blank" title="HackerRank Profili" class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-700/50 hover:bg-corporate-gold text-corporate-gold hover:text-black">
                    <i data-lucide="terminal" class="w-5 h-5"></i>
                </a>
            </div>

        </div>

    </div>

    <script>
        lucide.createIcons();
        let currentLang = 'tr';
        const texts = {
            tr: {
                title: "İsmail ÖKSÜZ - Dijital Kartvizit",
                mainRole: "Bilgisayar Mühendisi",
                secondaryRole: "Prompt Engineering Uzmanı",
                founderRole: "Kurucu, Nexyond",
            },
            en: {
                title: "İsmail ÖKSÜZ - Digital Business Card",
                mainRole: "Computer Engineer",
                secondaryRole: "Prompt Engineering Expert",
                founderRole: "Founder, Nexyond",
            }
        };
        const updateTexts = () => {
            const lang = texts[currentLang];
            document.getElementById('cardTitle').innerText = lang.title;
            document.getElementById('secondaryRole').innerText = lang.secondaryRole; 
            document.getElementById('mainRole').innerText = lang.mainRole;
            document.getElementById('founderRole').innerText = lang.founderRole;
            document.getElementById('langToggle').innerText = currentLang === 'tr' ? 'EN' : 'TR';
            document.documentElement.lang = currentLang;
        };
        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            updateTexts();
        });
        updateTexts();
    </script>
</body>
</html>
